services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rzs_stats
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/rzs_stats
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      ALLOWED_ORIGINS: http://localhost:5173
    depends_on:
      - postgres

volumes:
  pgdata:
