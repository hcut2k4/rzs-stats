spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/rzs_stats}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

rzs.neonsportz.base-url=https://neonsportz.com/api
rzs.neonsportz.league=RZS
rzs.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}

# Sync cron: nightly at 2am Eastern
rzs.sync.cron=${SYNC_CRON:0 0 2 * * *}

# Caffeine cache: 24h safety TTL, write-through via @CacheEvict on sync
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=24h
