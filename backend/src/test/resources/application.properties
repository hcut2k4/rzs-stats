# Override PostgreSQL dialect with H2 for @DataJpaTest
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# Required rzs.* properties (replaces main application.properties on the test classpath)
rzs.neonsportz.base-url=http://localhost
rzs.neonsportz.league=TEST
rzs.allowed-origins=http://localhost:5173
rzs.sync.cron=0 0 2 * * *
